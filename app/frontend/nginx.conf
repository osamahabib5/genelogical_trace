server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression for faster performance
    gzip on;
    gzip_types text/plain text/css text/xml text/javascript 
               application/x-javascript application/xml+rss 
               application/javascript application/json;

    # --- PROXY BLOCK ---
    # Handles API requests and routes them to the Azure Backend
    location /api/ {
        # The ${BACKEND_URL} is injected at runtime via Docker/Azure env vars
        proxy_pass ${BACKEND_URL};

        # --- FIX FOR "CONNECTION RESET BY PEER" ---
        # 1. Disable verification because Azure terminates SSL at the load balancer
        proxy_ssl_verify off;
        proxy_ssl_server_name on;
        
        # 2. Force the Host header to match the backend's expected domain
        # This is critical for Azure Container Apps routing
        proxy_set_header Host genealogy-backend.orangeground-33df987d.eastus.azurecontainerapps.io;

        # 3. Standard Proxy Headers
        proxy_http_version 1.1;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 4. Long timeouts for LLM/Genealogy data processing
        proxy_read_timeout 300;
        proxy_connect_timeout 300;
        proxy_send_timeout 300;
    }

    # SPA routing: all non-file requests go to index.html
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Cache static assets (JS, CSS, images) for 1 year
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
    }
}