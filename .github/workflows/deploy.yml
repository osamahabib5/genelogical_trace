name: Deploy to Azure Container Apps

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ${{ secrets.ACR_NAME }}.azurecr.io
  BACKEND_IMAGE: genealogy-backend
  FRONTEND_IMAGE: genealogy-frontend

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # 1. Detect which folders changed
    - name: Check for changes
      uses: dorny/paths-filter@v3
      id: changes
      with:
        filters: |
          backend:
            - 'app/backend/**'
          frontend:
            - 'app/frontend/**'

    - name: Login to Azure
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Login to ACR
      run: |
        az acr login --name ${{ secrets.ACR_NAME }}

    # 2. Set up Docker Buildx (Required for advanced caching)
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    # --- BACKEND SECTION ---
    - name: Build and push backend image
      if: steps.changes.outputs.backend == 'true'
      uses: docker/build-push-action@v5
      with:
        context: ./app/backend
        push: true
        tags: ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Deploy backend to Azure Container Apps
      if: steps.changes.outputs.backend == 'true'
      run: |
        az containerapp update \
          --name genealogy-backend \
          --resource-group ${{ secrets.RESOURCE_GROUP }} \
          --image ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:${{ github.sha }} \
          --set-env-vars LLM_PROVIDER="azure-foundry" \
                         AZURE_FOUNDRY_ENDPOINT=${{ secrets.AZURE_FOUNDRY_ENDPOINT }} \
                         AZURE_FOUNDRY_API_KEY=${{ secrets.AZURE_FOUNDRY_API_KEY }} \
                         AZURE_POSTGRES_CONNECTION_STRING=${{ secrets.AZURE_POSTGRES_CONNECTION_STRING }}

    # --- FRONTEND SECTION ---
    - name: Build and push frontend image
      if: steps.changes.outputs.frontend == 'true'
      uses: docker/build-push-action@v5
      with:
        context: ./app/frontend
        push: true
        tags: ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
        build-args: |
          REACT_APP_API_URL=https://genealogy-backend.orangeground-33df987d.eastus.azurecontainerapps.io
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Deploy frontend to Azure Container Apps
      if: steps.changes.outputs.frontend == 'true'
      run: |
        az containerapp update \
          --name genealogy-frontend \
          --resource-group ${{ secrets.RESOURCE_GROUP }} \
          --image ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}:${{ github.sha }}