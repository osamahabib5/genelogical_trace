name: Deploy to Azure Container Apps

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ${{ secrets.ACR_NAME }}.azurecr.io
  BACKEND_IMAGE: genealogy-backend
  FRONTEND_IMAGE: genealogy-frontend

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Login to Azure
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Login to ACR
      run: |
        az acr login --name ${{ secrets.ACR_NAME }}

    - name: Build and push backend image
      run: |
        docker build -t ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:${{ github.sha }} ./app/backend
        docker push ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:${{ github.sha }}

    - name: Build and push frontend image
      run: |
        docker build -t ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}:${{ github.sha }} ./app/frontend
        docker push ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}:${{ github.sha }}

    - name: Deploy backend to Azure Container Apps
      run: |
        az containerapp update \
          --name genealogy-backend \
          --resource-group ${{ secrets.RESOURCE_GROUP }} \
          --image ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:${{ github.sha }} \
          --set-env-vars LLM_PROVIDER="azure-foundry" \
                         AZURE_FOUNDRY_ENDPOINT=${{ secrets.AZURE_FOUNDRY_ENDPOINT }} \
                         AZURE_FOUNDRY_API_KEY=${{ secrets.AZURE_FOUNDRY_API_KEY }} \
                         AZURE_POSTGRES_CONNECTION_STRING=${{ secrets.AZURE_POSTGRES_CONNECTION_STRING }}

    - name: Deploy frontend to Azure Container Apps
      run: |
        az containerapp update \
          --name genealogy-frontend \
          --resource-group ${{ secrets.RESOURCE_GROUP }} \
          --image ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}:${{ github.sha }} \
          --ingress external \
          --target-port 80