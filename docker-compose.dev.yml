version: '3.8'

# Development override for docker-compose.yml
# Usage: docker-compose -f docker-compose.yml -f docker-compose.dev.yml up

services:
  backend:
    environment:
      DEBUG: "true"
    volumes:
      - ./app/backend:/app
      - /app/__pycache__
    ports:
      - "8000:8000"
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    environment:
      NODE_ENV: development
    ports:
      - "3000:3000"
    command: npm start
    stdin_open: true
    tty: true

  postgres:
    ports:
      - "5432:5432"
